<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Compass – Photo Uploader</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--blue:#003d82;--blue2:#0066cc;--accent:#00aaff;--gold:#ffaa00;--bg:#f0f4fa;--card:#fff;--text:#1a2540;--muted:#6b7a99;--border:#dde4f0;--green:#00c48c;--red:#ff4444;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  header{background:linear-gradient(135deg,var(--blue),var(--blue2));padding:18px 32px;box-shadow:0 4px 20px rgba(0,60,130,0.3)}
  header .logo{font-family:'Playfair Display',serif;font-size:22px;color:#fff;font-weight:700}
  header .subtitle{font-size:13px;color:rgba(255,255,255,0.7);font-weight:600}
  .container{max-width:900px;margin:0 auto;padding:28px 20px}
  .card{background:var(--card);border-radius:20px;padding:28px;box-shadow:0 4px 24px rgba(0,60,130,0.08);margin-bottom:20px}
  .card h2{font-family:'Playfair Display',serif;font-size:18px;color:var(--blue);margin-bottom:20px}
  .drop-zone{border:3px dashed var(--border);border-radius:16px;padding:48px;text-align:center;cursor:pointer;transition:all 0.2s;background:#f8faff}
  .drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:#e8f4ff}
  .drop-zone input{display:none}
  .drop-zone .icon{font-size:48px;margin-bottom:12px}
  .drop-zone .title{font-size:18px;font-weight:800;color:var(--blue);margin-bottom:6px}
  .drop-zone .sub{font-size:13px;color:var(--muted);font-weight:600}
  .queue{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:16px}
  .q-item{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:4/3;background:#dde4f0}
  .q-item img{width:100%;height:100%;object-fit:cover}
  .q-item .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
  .q-item.uploading .overlay{background:rgba(0,61,130,0.6);color:#fff}
  .q-item.done .overlay{background:rgba(0,196,140,0.7);color:#fff;font-size:24px}
  .q-item.error .overlay{background:rgba(255,68,68,0.7);color:#fff}
  .q-item .rm{position:absolute;top:4px;right:4px;width:20px;height:20px;background:var(--red);border-radius:50%;font-size:10px;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:900;z-index:10}
  .upload-btn{width:100%;background:linear-gradient(135deg,var(--blue2),var(--accent));color:#fff;border:none;padding:16px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;cursor:pointer;margin-top:16px;transition:all 0.2s;box-shadow:0 4px 16px rgba(0,100,200,0.3)}
  .upload-btn:hover{transform:translateY(-2px)}
  .upload-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
  .progress-bar{height:8px;background:var(--border);border-radius:4px;margin-top:12px;overflow:hidden;display:none}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--blue2),var(--accent));border-radius:4px;transition:width 0.3s;width:0%}
  .results-box{background:#f0f4fa;border-radius:12px;padding:16px;font-size:12px;font-family:monospace;color:var(--blue);word-break:break-all;line-height:2;border:1px solid var(--border);min-height:60px;font-weight:700;white-space:pre-wrap}
  .results-box.empty{color:var(--muted);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600}
  .copy-btn{width:100%;background:linear-gradient(135deg,var(--green),#00e0a0);color:#fff;border:none;padding:14px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;margin-top:12px;transition:all 0.2s}
  .copy-btn:disabled{opacity:0.4;cursor:not-allowed}
  .stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .stat{background:#f0f4fa;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:800;color:var(--blue);border:1px solid var(--border)}
  .clear-btn{width:100%;background:transparent;color:var(--red);border:2px solid var(--red);padding:10px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;margin-top:8px}
</style>
</head>
<body>
<header>
  <div class="logo">🧭 Travel Compass</div>
  <div class="subtitle">Photo Uploader → ImgBB → Links για Google Sheet</div>
</header>
<div class="container">
  <div class="card">
    <h2>📸 Ανέβασε Φωτογραφίες</h2>
    <label class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" multiple onchange="addFiles(this.files)">
      <div class="icon">📁</div>
      <div class="title">Σύρε φωτό εδώ ή κλικ για επιλογή</div>
      <div class="sub">JPG, PNG, WEBP — πολλές μαζί</div>
    </label>
    <div class="queue" id="queue"></div>
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <button class="upload-btn" id="uploadBtn" onclick="startUpload()" disabled>⬆️ Ανέβασε όλες στο ImgBB</button>
  </div>

  <div class="card">
    <h2>🔗 Links για Google Sheet</h2>
    <div class="stats">
      <div class="stat">Σύνολο: <span id="statTotal">0</span></div>
      <div class="stat">✅ Έτοιμες: <span id="statDone">0</span></div>
      <div class="stat">❌ Σφάλμα: <span id="statError">0</span></div>
    </div>
    <div class="results-box empty" id="resultsBox">Τα links θα εμφανιστούν εδώ μετά το ανέβασμα...</div>
    <button class="copy-btn" id="copyBtn" onclick="copyLinks()" disabled>📋 Αντιγραφή όλων (με κόμα)</button>
    <button class="clear-btn" onclick="clearAll()">✕ Καθαρισμός</button>
  </div>
</div>

<script>
const API_KEY = '02fa04f9e2d885c26cbf1c6635041f4a';
let files = [];

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag'); addFiles(e.dataTransfer.files); });

function addFiles(newFiles) {
  Array.from(newFiles).forEach(f => {
    if (!f.type.startsWith('image/')) return;
    files.push({id: Date.now()+Math.random(), file: f, status: 'pending', url: null, preview: URL.createObjectURL(f)});
  });
  renderQueue();
  document.getElementById('uploadBtn').disabled = files.length === 0;
  updateStats();
}

function renderQueue() {
  document.getElementById('queue').innerHTML = files.map((f,i) => `
    <div class="q-item ${f.status}">
      <img src="${f.preview}"/>
      <div class="overlay">${f.status==='done'?'✓':f.status==='uploading'?'⏳':f.status==='error'?'✗':''}</div>
      ${f.status==='pending'?`<div class="rm" onclick="removeFile(${i})">✕</div>`:''}
    </div>`).join('');
}

function removeFile(i) {
  files.splice(i,1);
  renderQueue();
  document.getElementById('uploadBtn').disabled = files.length===0;
  updateStats();
}

async function startUpload() {
  document.getElementById('uploadBtn').disabled = true;
  document.getElementById('uploadBtn').textContent = '⏳ Ανεβάζει...';
  document.getElementById('progressBar').style.display = 'block';

  const pending = files.filter(f => f.status==='pending');
  let done = 0;

  for (const f of pending) {
    f.status = 'uploading';
    renderQueue();
    try {
      const fd = new FormData();
      fd.append('image', f.file);
      fd.append('key', API_KEY);
      const r = await fetch('https://api.imgbb.com/1/upload', {method:'POST', body:fd});
      const d = await r.json();
      if (d.success) { f.status='done'; f.url=d.data.image.url; }
      else f.status='error';
    } catch(e) { f.status='error'; }
    done++;
    document.getElementById('progressFill').style.width=(done/pending.length*100)+'%';
    renderQueue();
    updateStats();
    updateResults();
  }

  document.getElementById('uploadBtn').textContent = '✅ Ολοκληρώθηκε!';
  setTimeout(()=>{document.getElementById('uploadBtn').textContent='⬆️ Ανέβασε όλες στο ImgBB';document.getElementById('uploadBtn').disabled=false;},2000);
}

function updateResults() {
  const urls = files.filter(f=>f.url).map(f=>f.url);
  if (!urls.length) return;
  const box = document.getElementById('resultsBox');
  box.className = 'results-box';
  box.textContent = urls.join(',');
  document.getElementById('copyBtn').disabled = false;
}

function updateStats() {
  document.getElementById('statTotal').textContent = files.length;
  document.getElementById('statDone').textContent = files.filter(f=>f.status==='done').length;
  document.getElementById('statError').textContent = files.filter(f=>f.status==='error').length;
}

function copyLinks() {
  const urls = files.filter(f=>f.url).map(f=>f.url).join(',');
  navigator.clipboard.writeText(urls).then(()=>{
    const btn = document.getElementById('copyBtn');
    btn.textContent='✅ Αντιγράφηκαν!';
    setTimeout(()=>btn.textContent='📋 Αντιγραφή όλων (με κόμα)',2500);
  });
}

function clearAll() {
  files=[];
  document.getElementById('queue').innerHTML='';
  document.getElementById('resultsBox').className='results-box empty';
  document.getElementById('resultsBox').textContent='Τα links θα εμφανιστούν εδώ μετά το ανέβασμα...';
  document.getElementById('uploadBtn').disabled=true;
  document.getElementById('copyBtn').disabled=true;
  document.getElementById('progressBar').style.display='none';
  document.getElementById('progressFill').style.width='0%';
  updateStats();
}
</script>
</body>
</html>
